#===========================|  Basic Configuration  |===========================#
# wav setting
sample_rate: 16000
volume_normalize: True
# mel setting
n_fft: 1024
win_length: 640
hop_length: 320
mel_fmin: 10 
mel_fmax: null
num_mels: 128
latent_hop_length: 1280
highpass_cutoff_freq: 40
offline_feature_extracted: False
align_multiple: 1
ssl_per_sem_ratio: 4

#===========================|  Dataset Configuration |==========================#
segment_duration: 2.4   # (s)
max_val_duration: 12
datasets:
  train: 
    - <path_to_train.jsonl>
  val: 
    - <path_to_val.jsonl>

#===========================|  Dataloader Configuration |=======================#
dataloader:
  _target_: x_vc.models.codec.sac.dataloader.VCSSLWAVDataset
  cycle: 1
  list_shuffle: True
  partition: True
  batch_type: static     # choices = ['static', 'bucket', 'dynamic']
  prefetch: 200
  reconstruction_ratio: 0.2
  reversed_ratio: 0.4
  mask_target_condition: True
  static:
    batch_size: 24

#===========================|  Training Configuration |=========================#
trainer:
  _target_: x_vc.models.codec.sac.trainer.VCCodecTrainer

current_step: 0
current_epoch: 0
grad_clip: 5

log_interval: 20  # 20
val_interval: 500 # 1000
syn_interval: 10000 # 10000
save_interval: 10000  # 10000
keep_interval: 25000
tmp_save_time: 3600          # s
empty_cache_interval: 100
total_step: 1000000 # 1000000
max_epoch: 1000000 # 500
max_val_utts: 50
generator_warmup_steps: 1500

use_mel_cond: True

# EMA Configuration
ema_update: True

#===========================|  Model Configuration |============================#
model:
  generator:
    _target_: x_vc.models.codec.sac.model.XVC
    # checkpoint: ckpts/SAC-16k-62_5Hz.pt
    checkpoint: null
    no_grad: False
    optim: adamw
    optim_conf:
      lr: 0.0001
      betas: [0.8, 0.9]
    scheduler: exponentiallr
    scheduler_conf:
      gamma: 0.999996
      min_lr: 1e-6
    frame_condition_type: "mel"

    mel_extractor:
      _target_: x_vc.models.codec.sac.modules.mel_extractor.MelExtractor
      sample_rate: 16000
      n_fft: 1024
      win_length: 640
      hop_length: 320
      mel_fmin: 10 
      mel_fmax: null
      num_mels: 128

    # semantic_encoder: 
    #   _target_: x_vc.models.codec.sac.modules.semantic_encoder.WhisperVQEncoder
    #   config:
    #     _target_: x_vc.models.codec.sac.third_party.hf_whisper.configuration_whisper.WhisperVQConfig
    #   from_pretrained:
    #     hf_repo: "THUDM/glm-4-voice-tokenizer"
    #     local_ckpt: "/hpc_stor03/sjtu_home/qixi.zheng/downloads/glm-4-voice-tokenizer"
    #     freeze: True
    #     load_codebook_only: False

    semantic_encoder: 
      _target_: x_vc.models.codec.sac.modules.semantic_encoder.WhisperVQEncoderWrapper  # wrapper class entry point
      encoder:  # first wrapper argument: internal WhisperVQEncoder instance
        _target_: x_vc.models.codec.sac.modules.semantic_encoder.WhisperVQEncoder
        config:
          _target_: x_vc.models.codec.sac.third_party.hf_whisper.configuration_whisper.WhisperVQConfig
        from_pretrained:  # WhisperVQEncoder initialization arguments
          # SAC reference: https://huggingface.co/zai-org/glm-4-voice-tokenizer
          hf_repo: "zai-org/glm-4-voice-tokenizer"
          local_ckpt: null
          freeze: True
          load_codebook_only: False
      cfg: 
        # Keep both fields so wrapper can resolve model_path = local_ckpt or hf_repo.
        hf_repo: "zai-org/glm-4-voice-tokenizer"
        local_ckpt: null
        freeze: True
        load_codebook_only: False

    semantic_adapter:
      _target_: x_vc.models.codec.sac.modules.decoder.Decoder_with_upsample
      input_channels: 1280  # 1280 for Whisper feature
      vocos_dim: 384    # bottleneck dimension
      vocos_intermediate_dim: 2048
      vocos_num_layers: 12
      out_channels: 1024
      sample_ratios: [2,2]
      use_tanh_at_final: False

    acoustic_encoder:
      _target_: x_vc.models.codec.sac.modules.acoustic_encoder.AcousticEncoder
      encoder_dim: 64
      encoder_rates: [2, 4, 5, 8]  # 640x downsample
      latent_dim: 1024
      no_grad: True
    
    acoustic_converter: 
      _target_: x_vc.models.codec.sac.modules.acoustic_converter.AcousticConverter
      in_channels_x: 1024
      in_channels_c: 128
      condition_dim: 192
      dim: 512
      depth: 6
      heads: 8
      dim_head: 64
      ff_mult: 4
      position_agnostic: False
      convert: "after_prenet"

    acoustic_quantizer:
      _target_: x_vc.models.codec.base.quantizer.factorized_vector_quantize.FactorizedVectorQuantize
      input_dim: 1024
      codebook_size: 16384
      codebook_dim: 8
      commitment: 0.25
      codebook_loss_weight: 4.0
      use_l2_normlize: True
      threshold_ema_dead_code: 2
      forced_activation: True
      no_grad: True

    speaker_predictor:
      _target_: x_vc.models.codec.sac.modules.speaker_predictor.SpeakerPredictor
      input_dim: 1024
      output_dim: 192
      hidden_dim: 1024
      dropout: 0.1
      use_mean_std: True
    
    speaker_encoder:
      _target_: x_vc.models.codec.sac.modules.speaker_encoder.SpeakerEmbedder
      pretrained_dir: "pretrained/speech_eres2net_sv_en_voxceleb_16k"  # https://modelscope.cn/models/iic/speech_eres2net_sv_en_voxceleb_16k
      freeze: True

    prenet:
      _target_: x_vc.models.codec.sac.modules.decoder.Decoder_with_upsample
      input_channels: 2048  # 1024 (acoustic) + 1024 (semantic) = 2048
      vocos_dim: 768
      vocos_intermediate_dim: 2048
      vocos_num_layers: 12
      out_channels: 1024
      sample_ratios: [1,1]
      use_tanh_at_final: False

    semantic_decoder: 
      _target_: x_vc.models.codec.sac.modules.decoder.Decoder_with_upsample
      input_channels: 1024
      vocos_dim: 384    # bottleneck dimension
      vocos_intermediate_dim: 2048
      vocos_num_layers: 6
      out_channels: 1280  # 1280 for Whisper feature
      use_tanh_at_final: False

    acoustic_decoder: 
      _target_: x_vc.models.codec.sac.modules.vocoder.wave_generator.Decoder
      input_channel: 1024
      channels: 1536
      rates: [8, 5, 4, 2]
      kernel_sizes: [16,11,8,4]
    
    loss_config:
      sample_rate: 16000
      
      mel_loss:
        n_mels: [5, 10, 20, 40, 80, 160, 320]
        window_lengths: [32, 64, 128, 256, 512, 1024, 2048]
        mel_fmin: [0, 0, 0, 0, 0, 0, 0]
        mel_fmax: [null, null, null, null, null, null, null]
        pow: 1.0
        clamp_eps: 1.0e-5
        mag_weight: 0.0
        log_weight: 1.0
        weight: 1.0
        match_stride: False
        window_type: None

      loss_weights:
        mse_loss: 1000.0
        vq_loss: 1
        mel_loss: 15.0
        sim_mse_loss: 10.0

  discriminator: 
    _target_: x_vc.models.codec.sac.model.WavDiscriminator
    # checkpoint: ckpts/SAC-16k-62_5Hz.pt
    checkpoint: null
    no_grad: False
    optim: adamw
    optim_conf:
      lr: 0.0001
      betas: [0.8, 0.9]
    scheduler: exponentiallr
    scheduler_conf:
      gamma: 0.999996
      min_lr: 1e-6

    loss_config:
      sample_rate: 16000
      loss_weights:
        adv_gen_loss: 1.0
        adv_feat_loss: 2.0
    
    discriminator:
      _target_: x_vc.models.codec.sac.modules.vocoder.wave_discriminator.Discriminator
      sample_rate: 16000
      periods: [2, 3, 5, 7, 11]
      fft_sizes: [2048, 1024, 512]
      bands: [[0.0, 0.1], [0.1, 0.25], [0.25, 0.5], [0.5, 0.75], [0.75, 1.0]]
